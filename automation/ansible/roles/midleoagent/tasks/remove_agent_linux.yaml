---
- set_fact:
    agent_install_dir: "/var/midleoagent"
- name: stop midleoagent
  service:
    name: midleoagent
    state: stopped
- name: stop midleoactions
  service:
    name: midleoactions
    state: stopped
- name: disable service
  systemd:
    name: midleoagent
    enabled: no
    daemon_reload: yes
- name: disable actions service
  systemd:
    name: midleoactions
    enabled: no
    daemon_reload: yes
- name: Remove service file
  file:
    path: "/etc/systemd/system/midleoagent.service"
    state: absent
- name: Remove actions service file
  file:
    path: "/etc/systemd/system/midleoactions.service"
    state: absent
- name: Remove service cron
  file:
    path: "/etc/cron.d/midleoagent"
    state: absent
- name: Remove midleoagent
  file:
    path: "{{agent_install_dir}}"
    state: absent
...
