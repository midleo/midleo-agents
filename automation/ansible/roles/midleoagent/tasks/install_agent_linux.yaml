---
- set_fact:
    agent_unique_id: "{{ lookup('password', '/dev/null length=16 chars=hexdigits') }}"
    agent_install_dir: "/var/midleoagent/"
    python_install_dir: "/usr/bin/python3"

- name: "Create {{ midleo_mwuser }} group"
  group:
    name: "{{ midleo_mwuser }}"
    state: present

- name: "Create {{ midleo_mwuser }} user"
  user:
    name: "{{ midleo_mwuser }}"
    shell: /bin/bash
    groups: "{{ midleo_mwuser }}"
    expires: -1
    create_home: yes

- name: "Add to docker if present"
  user:
    name: "{{midleo_mwuser}}"
    groups: "docker"
    append: yes
  ignore_errors: True

- name: "Create Midleo crypto directory"
  file:
    path: /etc/midleo
    state: directory
    owner: root
    group: "{{midleo_mwuser}}"
    mode: '0750'

- name: "Create Midleo crypto secret"
  copy:
    dest: /etc/midleo/crypto.secret
    content: "{{ lookup('password', '/dev/null length=64 chars=ascii_letters,digits') }}\n"
    owner: root
    group: "{{midleo_mwuser}}"
    mode: '0640'
    force: no

- name: "create midleoagent folder"
  file:
    path: "{{item}}"
    state: directory
    owner: "{{midleo_mwuser}}"
    group: "{{midleo_mwuser}}"
    mode: '0750'
  loop:
    - "{{agent_install_dir}}"
    - "{{agent_install_dir}}modules"
    - "{{agent_install_dir}}runable"
    - "{{agent_install_dir}}logs"
    - "{{agent_install_dir}}config"
    - "{{agent_install_dir}}extchecks"
- name: "Secure Midleo private runtime directories"
  file:
    path: "{{item}}"
    state: directory
    owner: "{{midleo_mwuser}}"
    group: "{{midleo_mwuser}}"
    mode: '0700'
  loop:
    - "{{agent_install_dir}}logs"
    - "{{agent_install_dir}}config"
- name: "creage agent"
  template:
    src: templates/python/midleo_client.py
    dest: "{{agent_install_dir}}midleo_client.py"
    owner: "{{midleo_mwuser}}"
    group: "{{midleo_mwuser}}"
    mode: '0750'
- name: "create actions agent"
  template:
    src: templates/python/midleo_actions.py
    dest: "{{agent_install_dir}}midleo_actions.py"
    owner: "{{midleo_mwuser}}"
    group: "{{midleo_mwuser}}"
    mode: '0750'
- name: "creage agent script"
  template:
    src: templates/python/magent.sh
    dest: "{{agent_install_dir}}magent.sh"
    owner: "{{midleo_mwuser}}"
    group: "{{midleo_mwuser}}"
    mode: '0755'
- name: "creage cronjob script"
  template:
    src: templates/python/cronjobs.sh
    dest: "{{agent_install_dir}}cronjobs.sh"
    owner: "{{midleo_mwuser}}"
    group: "{{midleo_mwuser}}"
    mode: '0755'
- name: "copy cronjobs json"
  template:
    src: templates/python/config/cronjobs.json
    dest: "{{agent_install_dir}}config/cronjobs.json"
    owner: "{{midleo_mwuser}}"
    group: "{{midleo_mwuser}}"
    mode: '0600'
- name: "check exist agentconfig"
  stat: "path={{agent_install_dir}}config/mwagent.config"
  register: st_agcfg
- name: "creage agentconfig"
  template:
    src: templates/mwagent.config.j2
    dest: "{{agent_install_dir}}config/mwagent.config"
    owner: "{{midleo_mwuser}}"
    group: "{{midleo_mwuser}}"
    mode: '0600'
  when: not st_agcfg.stat.exists
- name: "secure agentconfig"
  file:
    path: "{{agent_install_dir}}config/mwagent.config"
    owner: "{{midleo_mwuser}}"
    group: "{{midleo_mwuser}}"
    mode: '0600'

- name: "Install Midleo sudoers policy"
  template:
    src: templates/mwadmin.sudo.j2
    dest: "/etc/sudoers.d/{{midleo_mwuser}}.conf"
    owner: root
    group: root
    mode: '0440'
    validate: /usr/sbin/visudo -cf %s

- name: "Create module directories"
  file:
    path: "{{ agent_install_dir }}/modules/{{ item.path }}"
    state: directory
    owner: "{{ midleo_mwuser }}"
    group: "{{ midleo_mwuser }}"
    mode: '0750'
  with_filetree: templates/python/modules
  when: item.state == 'directory'
- name: "Create runable directories"
  file:
    path: "{{ agent_install_dir }}/runable/{{ item.path }}"
    state: directory
    owner: "{{ midleo_mwuser }}"
    group: "{{ midleo_mwuser }}"
    mode: '0750'
  with_filetree: templates/python/runable
  when: item.state == 'directory'
- name: "Upload module scripts"
  copy: 
    src: "{{ item.src }}"
    dest: "{{ agent_install_dir }}/modules/{{ item.path }}"
    owner: "{{ midleo_mwuser }}"
    group: "{{ midleo_mwuser }}"
    mode: '0640'
    force: yes
  with_filetree: templates/python/modules
  when: item.state == 'file'
- name: "Upload runable scripts"
  copy: 
    src: "{{ item.src }}"
    dest: "{{ agent_install_dir }}/runable/{{ item.path }}"
    owner: "{{ midleo_mwuser }}"
    group: "{{ midleo_mwuser }}"
    mode: '0755'
    force: yes
  with_filetree: templates/python/runable
  when: item.state == 'file'
- name: "Own Midleo private runtime files"
  file:
    path: "{{item}}"
    owner: "{{midleo_mwuser}}"
    group: "{{midleo_mwuser}}"
    recurse: yes
  loop:
    - "{{agent_install_dir}}logs"
    - "{{agent_install_dir}}config"
- name: "Harden Midleo private runtime permissions"
  shell: |
    find "{{agent_install_dir}}config" -type d -exec chmod 700 {} +
    find "{{agent_install_dir}}config" -type f -exec chmod 600 {} +
    find "{{agent_install_dir}}logs" -type d -exec chmod 700 {} +
    find "{{agent_install_dir}}logs" -type f -exec chmod 600 {} +
  args:
    executable: /bin/bash
  changed_when: false
- name: Update apt repo and cache on all Debian/Ubuntu boxes
  apt: 
    update_cache: yes 
    force_apt_get: yes 
    cache_valid_time: 3600
  when: ansible_os_family == "Debian"
  tags: update
- name: Select required system packages
  set_fact:
    midleo_agent_system_packages: "{{ ['gcc', 'curl', 'jq', 'python3-dev', 'python3-pip', 'python3-setuptools'] if ansible_os_family == 'Debian' else ['gcc', 'curl', 'jq', 'python3-devel', 'python3-pip', 'python3-setuptools'] }}"
- name: Install required system packages
  package:
    name: "{{ midleo_agent_system_packages }}"
    state: present
- name: Install python packages
  pip:
    name:
      - psutil
      - py-cpuinfo
      - dnspython
      - requests
      - pycryptodome
      - pywinrm
      - netifaces
    state: present
    extra_args: --break-system-packages
- name: Install optional IBM MQ Python package
  pip:
    name: pymqi
    state: present
    extra_args: --break-system-packages
  when: midleo_install_pymqi | default(false) | bool
- name: copy agent service
  template:
    src: "templates/agent_linux_service.j2"
    dest: "/etc/systemd/system/midleoagent.service"
    owner: root
    group: root
    mode: '0644'
- name: copy actions service
  template:
    src: "templates/agent_linux_actions_service.j2"
    dest: "/etc/systemd/system/midleoactions.service"
    owner: root
    group: root
    mode: '0644'
- name: enable service
  systemd:
    name: midleoagent
    enabled: yes
    daemon_reload: yes
    masked: no
- name: enable actions service
  systemd:
    name: midleoactions
    enabled: yes
    daemon_reload: yes
    masked: no
- name: start midleoagent
  service:
    name: midleoagent
    state: restarted
- name: start midleoactions
  service:
    name: midleoactions
    state: restarted
- name: "Remove legacy periodic service restart"
  cron:
    name: restart agent
    cron_file: midleoagent
    user: "{{midleo_mwuser}}"
    state: absent
- name: "Create cronjob /etc/cron.d/midleoagent"
  cron:
    name: midleo cronjobs
    minute: "*"
    user: "{{midleo_mwuser}}"
    job: "{{agent_install_dir}}cronjobs.sh"
    cron_file: midleoagent
...
